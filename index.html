<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResQLink — Disaster Relief Task Coordination</title>
  <meta name="description"
    content="ResQLink: Coordinate disaster relief tasks, manage volunteers, and track urgent operations in real time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ═══════════════════════════════════════════════ NAVBAR ═══ -->
  <header class="navbar">
    <div class="nav-brand">
      <span class="brand-icon">🚨</span>
      <span class="brand-name">ResQLink</span>
    </div>
    <nav class="nav-links">
      <a href="#" class="nav-link active">Dashboard</a>
      <a href="#" class="nav-link">Tasks</a>
      <a href="#" class="nav-link">Volunteers</a>
    </nav>
    <div class="nav-user">Coordinator: <strong>Admin</strong></div>
  </header>

  <!-- ═══════════════════════════════════════════════ STATS BAR ═══ -->
  <section class="stats-bar">
    <div class="stat-card">
      <p class="stat-label">Active Tasks</p>
      <p class="stat-value" id="stat-active">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Critical</p>
      <p class="stat-value critical-val" id="stat-critical">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Volunteers <span id="stat-vol-badge" class="vol-badge">7</span></p>
      <p class="stat-value" id="stat-volunteers">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Completed Today</p>
      <p class="stat-value completed-val" id="stat-completed">0</p>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════ MAIN LAYOUT ═══ -->
  <main class="main-layout">

    <!-- ─── LEFT: Task Grid ─── -->
    <section class="tasks-section">

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="priority-pills">
          <button class="pill active" data-priority="all" id="pill-all">All</button>
          <button class="pill critical" data-priority="critical" id="pill-critical">Critical</button>
          <button class="pill high" data-priority="high" id="pill-high">High</button>
          <button class="pill medium" data-priority="medium" id="pill-medium">Medium</button>
        </div>
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search tasks…" aria-label="Search tasks" />
        </div>
      </div>

      <!-- Task Cards Grid -->
      <div class="task-grid" id="task-grid">
        <!-- Cards injected by JS -->
      </div>
    </section>

    <!-- ─── RIGHT: Volunteers Sidebar ─── -->
    <aside class="volunteers-sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">Available Volunteers</h2>
      </div>
      <div class="volunteer-list" id="volunteer-list">
        <!-- Volunteer cards injected by JS -->
      </div>
      <button class="register-btn" id="register-btn">+ Register Volunteer</button>
    </aside>

  </main>

  <!-- ═══════════════════════════════════════════════ NEW TASK FAB ═══ -->
  <button class="fab" id="fab-new-task" aria-label="Create new task">＋</button>

  <!-- ═══════════════════════════════════════════════ CREATE TASK MODAL ═══ -->
  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" id="create-task-modal">
      <div class="modal-header">
        <h2 id="modal-title">Create New Task</h2>
        <button class="modal-close" id="modal-close" aria-label="Close modal">✕</button>
      </div>

      <div class="modal-body">
        <!-- Task Title -->
        <div class="form-group">
          <label for="task-title">Task Title <span class="required">*</span></label>
          <input type="text" id="task-title" placeholder="e.g. Food Distribution — Zone C" autocomplete="off" />
          <span class="field-error" id="title-error"></span>
        </div>

        <!-- Priority + Min Volunteers -->
        <div class="form-row">
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-min-vol">Min. Volunteers</label>
            <input type="number" id="task-min-vol" value="1" min="1" />
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="task-desc">Description <span class="required">*</span></label>
          <textarea id="task-desc" rows="3" placeholder="Task details, location, special requirements… (max 200 chars)"
            maxlength="200"></textarea>
          <div class="desc-footer">
            <span class="field-error" id="desc-error"></span>
            <span class="char-counter" id="char-counter">0 / 200</span>
          </div>
        </div>

        <!-- Required Skills -->
        <div class="form-group">
          <label>Required Skills</label>
          <div class="skills-grid">
            <label class="skill-chk"><input type="checkbox" name="skill" value="First Aid" /> First Aid</label>
            <label class="skill-chk"><input type="checkbox" name="skill" value="Logistics" /> Logistics</label>
            <label class="skill-chk"><input type="checkbox" name="skill" value="Medical" /> Medical</label>
            <label class="skill-chk"><input type="checkbox" name="skill" value="Engineering" /> Engineering</label>
            <label class="skill-chk"><input type="checkbox" name="skill" value="Search & Rescue" /> Search &amp;
              Rescue</label>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="create-task-btn">Create Task</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════ REGISTER VOLUNTEER MODAL ═══ -->
  <div class="modal-backdrop" id="vol-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="vol-modal-title" id="vol-modal">
      <div class="modal-header">
        <h2 id="vol-modal-title">Register Volunteer</h2>
        <button class="modal-close" id="vol-modal-close" aria-label="Close modal">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="vol-name">Full Name <span class="required">*</span></label>
          <input type="text" id="vol-name" placeholder="Full name" />
          <span class="field-error" id="vol-name-error"></span>
        </div>
        <div class="form-group">
          <label for="vol-email">Email <span class="required">*</span></label>
          <input type="email" id="vol-email" placeholder="volunteer@email.com" />
          <span class="field-error" id="vol-email-error"></span>
        </div>
        <div class="form-group">
          <label>Skills</label>
          <div class="skills-grid">
            <label class="skill-chk"><input type="checkbox" name="vol-skill" value="First Aid" /> First Aid</label>
            <label class="skill-chk"><input type="checkbox" name="vol-skill" value="Medical" /> Medical</label>
            <label class="skill-chk"><input type="checkbox" name="vol-skill" value="Logistics" /> Logistics</label>
            <label class="skill-chk"><input type="checkbox" name="vol-skill" value="Engineering" /> Engineering</label>
            <label class="skill-chk"><input type="checkbox" name="vol-skill" value="Search & Rescue" /> Search &amp;
              Rescue</label>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="vol-cancel">Cancel</button>
        <button class="btn-primary" id="vol-submit-btn">Register</button>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
